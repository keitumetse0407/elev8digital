<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5DC88"/>
      <stop offset="45%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#7A5E1A"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A5E1A"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#7A5E1A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Subtle radial light -->
  <circle cx="250" cy="210" r="180" fill="rgba(201,168,76,0.06)"/>

  <!-- Corner marks -->
  <line x1="30" y1="30" x2="60" y2="30" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="30" x2="30" y2="60" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>
  <line x1="470" y1="30" x2="440" y2="30" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>
  <line x1="470" y1="30" x2="470" y2="60" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="470" x2="60" y2="470" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="470" x2="30" y2="440" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>
  <line x1="470" y1="470" x2="440" y2="470" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>
  <line x1="470" y1="470" x2="470" y2="440" stroke="#C9A84C" stroke-width="2" opacity="0.6"/>

  <!-- Top label -->
  <text x="250" y="72" font-family="Arial Narrow, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="6" fill="#C9A84C" text-anchor="middle" opacity="0.8">DENNILTON · LIMPOPO</text>

  <!-- Main E8 monogram -->
  <!-- Giant E -->
  <text x="118" y="295" font-family="Impact, Arial Black, sans-serif" font-size="240" font-weight="900" fill="url(#gold)" filter="url(#glow)" opacity="0.15">E</text>

  <!-- ELEV8 main text -->
  <text x="250" y="256" font-family="Impact, Arial Black, sans-serif" font-size="108" font-weight="900" fill="url(#gold)" text-anchor="middle" filter="url(#glow)" letter-spacing="2">ELEV8</text>

  <!-- Divider line -->
  <line x1="80" y1="278" x2="420" y2="278" stroke="url(#gold2)" stroke-width="1" opacity="0.5"/>

  <!-- DIGITAL -->
  <text x="250" y="322" font-family="Arial Narrow, Arial, sans-serif" font-size="38" font-weight="700" fill="#EFEFEF" text-anchor="middle" letter-spacing="18" opacity="0.9">DIGITAL</text>

  <!-- Bottom divider -->
  <line x1="140" y1="348" x2="360" y2="348" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text x="250" y="378" font-family="Arial, sans-serif" font-size="13" font-weight="300" fill="#C9A84C" text-anchor="middle" letter-spacing="3" font-style="italic" opacity="0.85">We elevate your business. Elev8™</text>

  <!-- Bottom dots -->
  <circle cx="210" cy="408" r="2" fill="#C9A84C" opacity="0.4"/>
  <circle cx="250" cy="408" r="2" fill="#C9A84C" opacity="0.7"/>
  <circle cx="290" cy="408" r="2" fill="#C9A84C" opacity="0.4"/>

  <!-- Outer border -->
  <rect x="18" y="18" width="464" height="464" rx="4" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
</svg>
